apiVersion: v1
kind: Service
metadata:
  name: simrunner-metrics
  labels:
    app: simrunner
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
spec:
  type: ClusterIP
  selector:
    app: simrunner
  ports:
  - port: 9090
    targetPort: 9090
    protocol: TCP
    name: metrics
  - port: 3000
    targetPort: 3000
    protocol: TCP
    name: http
