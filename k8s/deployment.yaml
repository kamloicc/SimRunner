apiVersion: apps/v1
kind: Deployment
metadata:
  name: simrunner
  labels:
    app: simrunner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: simrunner
  template:
    metadata:
      labels:
        app: simrunner
    spec:
      containers:
      - name: simrunner
        image: myacr.azurecr.io/simrunner:latest
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: simrunner-secrets
              key: mongo-uri
              optional: true
        - name: REPORTER_MONGO_URI
          valueFrom:
            secretKeyRef:
              name: simrunner-secrets
              key: reporter-mongo-uri
              optional: true
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            cpu: 1
            memory: 1Gi
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /app/config
          readOnly: true
      volumes:
      - name: config
        configMap:
          name: simrunner-config
          optional: true
